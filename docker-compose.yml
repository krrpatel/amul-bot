version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: amul_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  bot:
    build: .
    container_name: amul_bot
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHECK_INTERVAL=${CHECK_INTERVAL:-300}
      - MAX_WORKERS=${MAX_WORKERS:-8}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    command: python bot.py

  checker:
    build: .
    container_name: amul_checker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHECK_INTERVAL=${CHECK_INTERVAL:-300}
      - MAX_WORKERS=${MAX_WORKERS:-8}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    command: python notification_checker.py

volumes:
  redis_data:
